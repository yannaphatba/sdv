server {
    listen 80;
    
    # 1. ปรับ root ให้เป็นจุดที่ COPY ไฟล์ลงไป (ตาม WORKDIR ใน Dockerfile)
    root /var/www/html/sdv/public; 
    index index.php index.html;

    # 2. ปรับการดักจับ Path เพื่อให้ Laravel จัดการ Route เองได้ทุกตัว
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 3. จัดการไฟล์ PHP
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        # สำคัญมาก: ตัวแปรนี้ต้องชี้ไปที่ไฟล์ index.php จริงๆ
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}